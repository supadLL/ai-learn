name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
          - platform: linux
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Run checks and build web/electron bundles
        run: npm run build

      - name: Build desktop package
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-play-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          # AI Play __VERSION__

          AI Play 是一个基于 Electron + React + 本地 RAG 的 AI 技术学习桌面应用。

          ## 下载建议

          - Windows 用户优先下载 `AI-Play-*-win-x64.exe`，这是带安装向导的安装器，支持选择安装路径、创建桌面图标和开始菜单入口。
          - Windows 用户如果想查看完整应用目录或免安装运行，可以下载 `AI-Play-*-win-x64.zip`。
          - macOS 用户下载 `AI-Play-*-mac-*.dmg`。
          - Linux 用户下载 `AI-Play-*-linux-*.AppImage`。

          GitHub 会自动附带 Source code 压缩包，普通用户通常不需要下载源码。

          ## 当前能力

          - 系统化 AI 学习课程与阶段化学习路径。
          - 内置本地知识库检索与引用展示。
          - 对话式 RAG 学习助手。
          - 支持导入 Markdown、TXT、PDF 资料。
          - 支持离线 feature hashing embedding，也可配置自定义 Embedding API。
          - 支持自定义 LLM API、Responses API 和 Chat Completions API。
          EOF
          sed -i "s/__VERSION__/${GITHUB_REF_NAME}/g" release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-notes.md
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
            artifacts/*.zip
