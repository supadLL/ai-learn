name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
          - platform: linux
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Run checks and build web/electron bundles
        run: npm run build

      - name: Build desktop package
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-play-${{ matrix.platform }}
          path: |
            release/**
          if-no-files-found: error

  source:
    name: Build source archives
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source archives
        shell: bash
        run: |
          mkdir -p source
          VERSION="${GITHUB_REF_NAME}"
          git archive --format=zip --prefix="ai-play-${VERSION}/" --output="source/ai-play-${VERSION}-source.zip" HEAD
          git archive --format=tar.gz --prefix="ai-play-${VERSION}/" --output="source/ai-play-${VERSION}-source.tar.gz" HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-play-source
          path: source/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - source

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**
